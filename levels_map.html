<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhysX - Оқу картасы</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dropdown.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/responsive.css">
  <style>
:root{
  --blue:#145cff;
  --blue-dark:#082f8c;
  --dark:#061b55;
  --text:#071837;
  --muted:#64748b;
  --line:#dbe7f5;
  --green:#12b76a;
  --orange:#f59e0b;
  --soft:#f8fbff;
  --shadow:0 18px 42px rgba(13,71,161,.10);
}

*{box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif}
html{scroll-behavior:smooth}

button, input, select, textarea {
  font-family: "Segoe UI", Arial, sans-serif !important;
}

a, span, div, p, h1, h2, h3, h4, h5, h6 {
  font-family: "Segoe UI", Arial, sans-serif;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(#d2dff1 1px,transparent 1px),
    linear-gradient(180deg,#fbfdff,#eef5ff);
  background-size:28px 28px,100% 100%;
  overflow-x:hidden;
}

/* HEADER */
.header{
  height:68px;
  background:#fff;
  border-bottom:1px solid #d6e6fb;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 2px 18px rgba(15,23,42,.04);
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:#0d47a1;
  text-decoration:none;
  font-size:30px;
  font-weight:900;
}
.nav{display:flex;align-items:center;gap:26px}
.nav-link{
  text-decoration:none;
  color:#06205b;
  font-weight:900;
  font-size:15px;
  padding:25px 0;
  position:relative;
  white-space:nowrap;
}
.nav-link.active{color:#ff9800}
.nav-link.active::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:8px;
  height:4px;
  border-radius:999px;
  background:#ff9800;
}
.login-link{
  background:#145cff;
  color:#fff!important;
  padding:14px 22px!important;
  border-radius:13px;
}
.login-link::after{display:none}
.nav-dropdown{position:relative}
.dropdown-menu{
  position:absolute;
  top:60px;
  left:0;
  min-width:230px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  box-shadow:var(--shadow);
  padding:10px;
  display:none;
}
.nav-dropdown:hover .dropdown-menu{display:block}
.dropdown-menu a{
  display:block;
  padding:11px 12px;
  border-radius:11px;
  color:#071837;
  text-decoration:none;
  font-weight:800;
}
.dropdown-menu a:hover{background:#eef6ff;color:#0d47a1}

/* LAYOUT */
.map-page{
  width:min(100% - 24px,1500px);
  margin:0 auto;
  padding:14px 0 38px;
  display:grid;
  grid-template-columns:292px minmax(0,1fr);
  gap:20px;
  align-items:start;
}
.map-main{min-width:0}

/* SIDEBAR */
.map-sidebar{
  position:sticky;
  top:82px;
  height:calc(100vh - 96px);
  overflow-y:auto;
  overflow-x:hidden;
  border-radius:22px;
  background:linear-gradient(180deg,#1765ff 0%,#053aa7 58%,#01236f 100%);
  color:#fff;
  box-shadow:0 22px 45px rgba(13,71,161,.25);
  padding:18px;
  scrollbar-width:thin;
}
.map-sidebar::-webkit-scrollbar{width:4px}
.map-sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.35);border-radius:999px}
.sidebar-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}
.sidebar-title{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:26px;
  line-height:1.15;
  font-weight:900;
}
.sidebar-title i{
  width:42px;
  height:42px;
  border-radius:15px;
  background:rgba(255,255,255,.17);
  display:grid;
  place-items:center;
}
.toggle-btn{
  border:none;
  width:36px;
  height:36px;
  border-radius:50%;
  background:rgba(255,255,255,.16);
  color:#fff;
  cursor:pointer;
  display:grid;
  place-items:center;
  transition:.22s ease;
}
.toggle-btn:hover{
  background:rgba(255,255,255,.24);
}
.toggle-btn i{
  transition:.22s ease;
}
.side-subtitle{
  font-size:14px;
  font-weight:900;
  color:#dbeafe;
  margin-bottom:16px;
}
.quick-finder{
  display:grid;
  gap:8px;
  margin-bottom:16px;
}
.quick-finder select,
.quick-finder input{
  width:100%;
  height:42px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  font-weight:900;
  color:#0f2450;
  background:rgba(255,255,255,.95);
}
.quick-finder button{
  height:42px;
  border:none;
  border-radius:12px;
  background:#fff;
  color:#0d47a1;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.side-card{
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.16);
  border-radius:17px;
  padding:15px;
  margin-bottom:16px;
}
.side-card h3{
  margin:0 0 14px;
  font-size:15px;
  font-weight:900;
}
.progress-big{
  display:flex;
  align-items:center;
  gap:14px;
}
.circle{
  width:68px;
  height:68px;
  border-radius:50%;
  background:conic-gradient(#38bdf8 0deg,#38bdf8 var(--deg),rgba(255,255,255,.22) 0deg);
  display:grid;
  place-items:center;
  position:relative;
  flex-shrink:0;
  font-weight:900;
}
.circle::after{
  content:"";
  position:absolute;
  width:48px;
  height:48px;
  border-radius:50%;
  background:#0943b6;
}
.circle span{
  position:relative;
  z-index:2;
  font-size:17px;
}
.side-progress-bar{
  height:8px;
  background:rgba(255,255,255,.24);
  border-radius:999px;
  overflow:hidden;
  margin:14px 0 9px;
}
.side-progress-bar div{
  height:100%;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  border-radius:999px;
}
.side-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:13px;
  font-weight:900;
  color:#fff;
}
.daily-title{
  display:flex;
  align-items:center;
  gap:7px;
  font-weight:900;
  margin-bottom:10px;
}
.daily-title i{color:#fbbf24}
.daily-text{
  font-size:13px;
  line-height:1.4;
  color:#eaf3ff;
  font-weight:800;
  margin-bottom:9px;
}
.daily-bar{
  height:8px;
  border-radius:999px;
  background:rgba(255,255,255,.22);
  overflow:hidden;
  margin-bottom:9px;
}
.daily-bar div{
  height:100%;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
}
.side-menu{
  display:grid;
  gap:10px;
  margin-bottom:16px;
}
.side-menu-btn{
  height:56px;
  border-radius:15px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.15);
  color:#fff;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 14px;
  font-size:15px;
  font-weight:900;
  text-decoration:none;
  cursor:pointer;
}
.side-menu-btn.active,
.side-menu-btn:hover{
  background:rgba(255,255,255,.20);
}
.side-menu-btn i{
  width:38px;
  height:38px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.15);
  font-size:18px;
}
.rocket-card{
  min-height:120px;
  background:
    radial-gradient(circle at 72% 56%,rgba(84,140,255,.88),transparent 32%),
    linear-gradient(180deg,#0c43d9,#061b72);
  border-radius:18px;
  padding:18px;
  overflow:hidden;
  position:relative;
}
.rocket-card h3{
  margin:0;
  font-size:16px;
  line-height:1.3;
  max-width:150px;
}
.rocket{
  position:absolute;
  right:18px;
  bottom:14px;
  font-size:72px;
  transform:rotate(18deg);
  filter:drop-shadow(0 18px 25px rgba(0,0,0,.25));
}

/* TOP */
.map-top-head{
  background:rgba(255,255,255,.96);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:18px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
.map-title h1{
  margin:0;
  font-size:28px;
  color:#061b55;
}
.map-title p{
  margin:6px 0 0;
  color:#64748b;
  font-weight:800;
}
.map-top-actions{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:10px;
  flex-shrink:0;
}
.map-collapse-btn,
.map-fullscreen-btn{
  height:42px;
  padding:0 16px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
  transition:.2s;
}
.map-collapse-btn{
  background:#edf5ff;
  color:#145cff;
  border:1px solid #d6e3f5;
}
.map-fullscreen-btn{
  background:#145cff;
  color:#fff;
  box-shadow:0 8px 18px rgba(20,92,255,.14);
}
.map-fullscreen-btn:hover,
.map-collapse-btn:hover{
  transform:translateY(-1px);
}

/* MAIN CARD */
.main-card{
  background:rgba(255,255,255,.96);
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:18px;
  margin-bottom:14px;
}
.tabs{
  display:flex;
  gap:26px;
  border-bottom:1px solid var(--line);
  margin-bottom:22px;
}
.tab-btn{
  border:none;
  background:transparent;
  color:#55708f;
  font-weight:900;
  padding:13px 0;
  cursor:pointer;
  position:relative;
}
.tab-btn.active{color:#145cff}
.tab-btn.active::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-1px;
  height:4px;
  border-radius:999px;
  background:#145cff;
}

/* LEVEL */
.level-section{
  scroll-margin-top:88px;
  margin-bottom:24px;
}
.level-hero{
  border:1px solid #d8e7f7;
  border-radius:20px;
  background:linear-gradient(135deg,#fff,#f8fbff);
  padding:22px 22px;
  margin-bottom:18px;
}
.level-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
}
.level-left{
  display:flex;
  align-items:center;
  gap:18px;
}
.level-icon{
  width:78px;
  height:78px;
  border-radius:50%;
  display:grid;
  place-items:center;
  color:#12b76a;
  background:#dcfce7;
  font-size:34px;
  flex-shrink:0;
}
.level-head h2{
  margin:0 0 7px;
  color:#061b55;
  font-size:28px;
}
.level-head p{
  margin:0;
  color:#334155;
  font-weight:800;
}
.count-badge{
  background:#edf5ff;
  color:#0d47a1;
  border:1px solid #d6e3f5;
  border-radius:14px;
  padding:13px 18px;
  font-weight:900;
  display:flex;
  gap:8px;
  align-items:center;
  white-space:nowrap;
}
.level-stats{
  margin-top:18px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
  flex-wrap:wrap;
}
.level-stat{
  height:36px;
  padding:0 15px;
  border-radius:10px;
  display:flex;
  align-items:center;
  gap:7px;
  font-size:13px;
  font-weight:900;
  border:1px solid #dce8f7;
  background:#f8fbff;
  color:#64748b;
}
.level-stat.green{background:#ecfdf5;border-color:#bbf7d0;color:#059669}
.level-stat.orange{background:#fff7ed;border-color:#fed7aa;color:#ea580c}
.level-stat.blue{background:#eff6ff;border-color:#bfdbfe;color:#145cff}
.level-stat.star{background:#fffbeb;border-color:#fde68a;color:#b45309}

/* CHAPTER */
.chapter-card{
  margin-bottom:22px;
}
.chapter-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:0 4px 12px;
}
.chapter-header h3{
  margin:0;
  color:#0d47a1;
  font-size:19px;
  font-weight:900;
}
.chapter-mini{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.chapter-pill{
  height:30px;
  padding:0 10px;
  border-radius:999px;
  background:#f1f5f9;
  border:1px solid #e2e8f0;
  color:#64748b;
  display:flex;
  align-items:center;
  font-size:12px;
  font-weight:900;
}
.chapter-pill.green{background:#ecfdf5;border-color:#bbf7d0;color:#059669}
.chapter-pill.orange{background:#fff7ed;border-color:#fed7aa;color:#ea580c}
.chapter-pill.blue{background:#eff6ff;border-color:#bfdbfe;color:#145cff}
.chapter-pill.star{background:#fffbeb;border-color:#fde68a;color:#b45309}
.chapter-progress{
  height:5px;
  background:#e8eef7;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:14px;
}
.chapter-progress-fill{
  height:100%;
  background:linear-gradient(90deg,#0d47a1,#12b76a);
}

/* ROADMAP */
.roadmap-wrap{
  display:grid;
  grid-template-columns:54px minmax(0,1fr);
  gap:18px;
}
.roadline{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
  padding-top:8px;
}
.roadline::before{
  content:"";
  position:absolute;
  top:22px;
  bottom:22px;
  width:2px;
  background:repeating-linear-gradient(180deg,#b8c7dc 0,#b8c7dc 8px,transparent 8px,transparent 14px);
  z-index:0;
}
.step{
  width:32px;
  height:32px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:#edf2f8;
  color:#7b8ca7;
  font-weight:900;
  z-index:1;
  border:3px solid #fff;
  box-shadow:0 0 0 1px #d6e3f5;
}
.step.done{
  background:#12b76a;
  color:#fff;
  box-shadow:none;
}
.step.current{
  background:#145cff;
  color:#fff;
  box-shadow:none;
}
.step.locked{
  background:#f3f6fb;
  color:#94a3b8;
  border:2px solid #d7e2f0;
  box-shadow:none;
}

/* LESSONS */
.lesson-list{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}
.lesson-card,
.lesson-card-disabled{
  min-height:138px;
  border-radius:17px;
  border:1px solid #d6e3f5;
  background:#fff;
  padding:17px;
  text-decoration:none;
  color:#061b55;
  display:grid;
  grid-template-columns:38px minmax(0,1fr);
  gap:12px;
  transition:.2s;
}
.lesson-card:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 26px rgba(13,71,161,.10);
}
.lesson-card-disabled{
  color:#64748b;
  cursor:not-allowed;
  background:#fbfdff;
}
.lesson-icon{
  width:38px;
  height:38px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:#edf2f8;
  color:#7b8ca7;
  font-size:14px;
  font-weight:900;
}
.lesson-card.current .lesson-icon{background:#145cff;color:#fff;font-size:17px}
.lesson-card.completed .lesson-icon{background:#12b76a;color:#fff}
.lesson-card-disabled .lesson-icon{background:#eef2f7;color:#94a3b8;border:1px solid #d8e2ef}
.lesson-info h4{
  margin:0;
  font-size:15px;
  line-height:1.25;
  color:#061b55;
}
.lesson-stars{
  margin-top:12px;
  display:flex;
  gap:2px;
  font-size:20px;
}
.lesson-stars span{
  color:#d8e1ee;
  text-shadow:0 1px 0 rgba(255,255,255,.85);
}
.lesson-stars span.filled{
  color:#f59e0b;
  text-shadow:0 3px 10px rgba(245,158,11,.28);
}
.lesson-status{
  grid-column:2;
  min-height:34px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:8px;
  padding:0 12px;
  font-weight:900;
  font-size:13px;
}
.status-completed{
  background:#ecfdf5;
  border:1px solid #bbf7d0;
  color:#059669;
}
.status-current{
  color:#145cff;
  justify-content:flex-start;
}
.status-locked{
  background:#f8fafc;
  border:1px solid #e2e8f0;
  color:#64748b;
}
.start-btn{
  height:38px;
  padding:0 20px;
  border-radius:11px;
  border:2px solid #145cff;
  background:#fff;
  color:#145cff;
  font-weight:900;
  cursor:pointer;
}

/* CONTROL */
.control-card,
.control-card-disabled{
  grid-column:1/-1;
  min-height:92px;
  border-radius:18px;
  border:1px solid #bbf7d0;
  background:linear-gradient(135deg,#ecfdf5,#ffffff);
  color:#061b55;
  display:grid;
  grid-template-columns:66px minmax(0,1fr) auto;
  align-items:center;
  gap:14px;
  padding:16px 18px;
  text-decoration:none;
  font-weight:900;
  margin-top:4px;
}
.control-card i,
.control-card-disabled i{
  width:52px;
  height:52px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:#12b76a;
  color:#fff;
  font-size:24px;
}
.control-card h4,
.control-card-disabled h4{
  margin:0 0 5px;
  color:#061b55;
  font-size:18px;
}
.control-card p,
.control-card-disabled p{
  margin:0;
  color:#334155;
  font-size:13px;
  font-weight:800;
}
.control-meta{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.control-meta span{
  height:36px;
  padding:0 14px;
  border-radius:10px;
  background:#f8fbff;
  border:1px solid #dbe7f5;
  color:#334155;
  display:flex;
  align-items:center;
  font-size:13px;
  font-weight:900;
}
.control-action{
  height:46px;
  padding:0 20px;
  border-radius:13px;
  border:none;
  background:#12b76a;
  color:#fff;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:8px;
}
.control-card-disabled{
  opacity:.92;
  border-color:#d8e1ee;
  background:linear-gradient(135deg,#f8fbff,#f1f5f9);
}
.control-card-disabled i{
  background:#e2e8f0;
  color:#64748b;
}
.control-card-disabled .control-action{
  background:#eef2f7;
  color:#64748b;
}

/* COLLAPSE */
body.map-top-collapsed .extra-top{display:none!important}
body.map-fullscreen-mode .header{display:none!important}
body.map-fullscreen-mode .map-page{
  width:calc(100% - 16px)!important;
  max-width:none!important;
  padding-top:8px!important;
}
body.map-fullscreen-mode .map-sidebar{
  top:8px!important;
  height:calc(100vh - 16px)!important;
}
body.map-fullscreen-mode .map-fullscreen-btn{
  background:#ef4444!important;
}

/* SIDEBAR COLLAPSE */
body.sidebar-collapsed .map-page{
  grid-template-columns:78px minmax(0,1fr);
}
body.sidebar-collapsed .map-sidebar{
  padding:14px 10px;
}
body.sidebar-collapsed .sidebar-head{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:8px;
}
body.sidebar-collapsed .toggle-btn{
  width:42px;
  height:42px;
  border-radius:14px;
}
body.sidebar-collapsed .toggle-btn i{
  transform:rotate(180deg);
}
body.sidebar-collapsed .sidebar-title span,
body.sidebar-collapsed .side-subtitle,
body.sidebar-collapsed .quick-finder,
body.sidebar-collapsed .side-card,
body.sidebar-collapsed .side-menu-btn span,
body.sidebar-collapsed .rocket-card h3{
  display:none!important;
}

function normalizeCompletedId(id){
  return String(id || "").replaceAll("_", "-");
}

function isCompletedItem(id) {
  const target = normalizeCompletedId(id);
  return completedLessons.some(item => normalizeCompletedId(item) === target);
}

function getControlId(levelName, controlNumber) {
  return `${levelName}-control-${controlNumber}`;
}

function isControlPassed(levelName, controlNumber) {
  return isCompletedItem(getControlId(levelName, controlNumber));
}

function getLessonStars(levelName, lessonNumber) {
  const keys = [
    /* Ең жақсы нәтиже бірінші оқылады */
    `${levelName}-lesson-${lessonNumber}_best_stars`,
    `${levelName}-lesson-${lessonNumber}-best-stars`,
    `${levelName}_lesson_${lessonNumber}_best_stars`,
    `lesson${lessonNumber}_best_stars`,
    `lesson${lessonNumber}_best_stars_${levelName}`,

    /* Бұрынғы және қазіргі карта key-лері */
    `${levelName}-lesson-${lessonNumber}-stars`,
    `${levelName}_lesson_${lessonNumber}_stars`,
    `${levelName}-lesson-${lessonNumber}_stars`,
    `lesson${lessonNumber}_stars`,
    `lesson${lessonNumber}_stars_${levelName}`,
    `lesson${lessonNumber}-stars`
  ];

  for (const key of keys) {
    const value = Number(localStorage.getItem(key) || 0);
    if (value > 0) return Math.max(0, Math.min(5, value));
  }

  return 0;
}

function renderLessonStars(levelName, lessonNumber) {
  const stars = getLessonStars(levelName, lessonNumber);
  let output = "";

  for (let i = 1; i <= 5; i++) {
    output += `<span class="${i <= stars ? "filled" : "empty"}">★</span>`;
  }

  return `<div class="lesson-stars" title="${stars} / 5 жұлдыз">${output}</div>`;
}


function getLessonPageUrl(lesson){
  return `${BASE_PATH}${lesson.file}`;
}

function clearLessonCurrentAttempt(levelName, lessonNumber){
  const lessonId = `${levelName}-lesson-${lessonNumber}`;

  /* Ең жақсы нәтиже мен картадағы жұлдыздар өшпейді. Тек жаңа әрекет үшін уақытша жауаптар тазаланады. */
  const keysToRemove = [
    `${lessonId}_answers`,
    `${lessonId}_checked`,
    `${lessonId}_score`,
    `${lessonId}_test_score`,
    `${lessonId}_lesson_score`,
    `${lessonId}_last_score`,
    `${lessonId}_last_stars`,
    `${lessonId}_xp`,
    `${lessonId}_current_xp`,
    `${lessonId}_sections_done`,
    `${lessonId}-answers`,
    `${lessonId}-checked`,
    `${lessonId}-score`,
    `${lessonId}-last-score`,
    `${lessonId}-last-stars`
  ];

  keysToRemove.forEach(key => localStorage.removeItem(key));
  localStorage.setItem(`${lessonId}_retry_mode`, "1");
}

function openLessonFromMap(event, levelName, lessonNumber, url, resetAttempt){
  if(event){
    event.preventDefault();
    event.stopPropagation();
  }

  if(resetAttempt){
    clearLessonCurrentAttempt(levelName, lessonNumber);
  }

  window.location.href = url;
}

function renderMapLessonAction(status, stars, levelName, lessonNumber, lessonUrl){
  const safeUrl = String(lessonUrl).replaceAll("'", "&#39;");

  if(status === "completed"){
    if(stars >= 5){
      return `<button type="button" class="map-lesson-action repeat" onclick="openLessonFromMap(event, '${levelName}', ${lessonNumber}, '${safeUrl}', true)"><i class="fa-solid fa-rotate-right"></i> Қайталау</button>`;
    }

    return `<button type="button" class="map-lesson-action retry" onclick="openLessonFromMap(event, '${levelName}', ${lessonNumber}, '${safeUrl}', true)"><i class="fa-solid fa-arrow-rotate-right"></i> Қайта өту</button>`;
  }

  if(status === "teacher"){
    return `<button type="button" class="map-lesson-action teacher" onclick="openLessonFromMap(event, '${levelName}', ${lessonNumber}, '${safeUrl}', false)"><i class="fa-solid fa-unlock"></i> Ашу</button>`;
  }

  if(status === "current"){
    return `<button type="button" class="start-btn" onclick="openLessonFromMap(event, '${levelName}', ${lessonNumber}, '${safeUrl}', false)">Бастау</button>`;
  }

  return "Құлыпталған";
}

function getChapterStars(levelName, startNumber, total){
  let stars = 0;
  for(let i = 0; i < total; i++){
    stars += getLessonStars(levelName, startNumber + i);
  }
  return stars;
}

function getRequiredChapterStars(total){
  return Math.ceil(total * 5 * 0.60);
}

function hasChapterEnoughStars(levelName, startNumber, total) {
  return getChapterStars(levelName, startNumber, total) >= getRequiredChapterStars(total);
}

function canAccessLevel(level) {
  if (isTeacherMode) return true;

  const currentLevel = levelOrder[userLevel] || levelOrder.beginner;
  return levelOrder[level] <= currentLevel;
}

function getLevelLessons(levelName) {
  let lessonNumber = 0;
  const level = courseStructure[levelName];

  return level.chapters.flatMap(chapter => chapter.lessons.map(title => {
    lessonNumber++;
    return {
      id: `${levelName}-lesson-${lessonNumber}`,
      number: lessonNumber,
      title: `${lessonNumber}-сабақ. ${title}`,
      rawTitle: title,
      chapterTitle: chapter.chapterTitle,
      control: chapter.control,
      file: `${levelName}/lesson${lessonNumber}.html`
    };
  }));
}

function getAllCourseLessons() {
  return visibleLevels.flatMap(level => getLevelLessons(level));
}

function getAllAvailableLessons() {
  return visibleLevels.filter(canAccessLevel).flatMap(level => getLevelLessons(level));
}

function getLevelProgress(levelName) {
  const lessons = getLevelLessons(levelName);
  const done = lessons.filter(l => isCompletedItem(l.id)).length;
  return {
    total: lessons.length,
    done,
    left: lessons.length - done,
    percent: lessons.length ? Math.round(done / lessons.length * 100) : 0
  };
}

function getLessonAccessInfo(levelName, lessonNumber) {
  const level = courseStructure[levelName];
  let start = 1;

  for (let i = 0; i < level.chapters.length; i++) {
    const chapter = level.chapters[i];
    const end = start + chapter.lessons.length - 1;

    if (lessonNumber >= start && lessonNumber <= end) {
      const previousChapter = level.chapters[i - 1];
      /* FIX: previousStart must point to the previous chapter, not the current chapter.
         Example: lesson 6 is the first lesson of chapter 2, so previousStart must be 1.
         Before this fix it became 6 and chapter 2 lessons stayed locked even after control #1. */
      const previousStart = i === 0 ? 1 : start - previousChapter.lessons.length;
      const previousStarsOk = isTeacherMode || i === 0 || hasChapterEnoughStars(levelName, previousStart, previousChapter.lessons.length);
      const previousControlPassed = isTeacherMode || i === 0 || (isControlPassed(levelName, i) && previousStarsOk);

      return {
        chapterIndex: i,
        controlNumber: i + 1,
        chapterStart: start,
        chapterEnd: end,
        previousControlPassed,
        chapterUnlocked: canAccessLevel(levelName) && previousControlPassed
      };
    }

    start = end + 1;
  }

  return {
    chapterIndex: 0,
    controlNumber: 1,
    chapterStart: 1,
    chapterEnd: 1,
    previousControlPassed: true,
    chapterUnlocked: canAccessLevel(levelName)
  };
}

function isLessonOpen(levelName, allLevelLessons, lessonNumber) {
  if (isTeacherMode) return true;
  if (!canAccessLevel(levelName)) return false;

  const lesson = allLevelLessons[lessonNumber - 1];
  const isCompleted = isCompletedItem(lesson.id);
  const info = getLessonAccessInfo(levelName, lessonNumber);

  if (!info.chapterUnlocked) return isCompleted;

  const isFirstInChapter = lessonNumber === info.chapterStart;
  const prevLesson = allLevelLessons[lessonNumber - 2];
  const prevCompleted = prevLesson ? isCompletedItem(prevLesson.id) : false;

  return isCompleted || isFirstInChapter || prevCompleted;
}

function getLessonStatus(levelName, allLevelLessons, lessonNumber) {
  const lesson = allLevelLessons[lessonNumber - 1];
  if (isCompletedItem(lesson.id)) return "completed";
  if (isTeacherMode) return "teacher";
  if (isLessonOpen(levelName, allLevelLessons, lessonNumber)) return "current";
  return "locked";
}

function getTotalStarsForLevel(levelName) {
  const lessons = getLevelLessons(levelName);
  return lessons.reduce((sum, lesson) => sum + getLessonStars(levelName, lesson.number), 0);
}

function getTotalStarsAllVisible() {
  return visibleLevels.reduce((sum, level) => sum + getTotalStarsForLevel(level), 0);
}

function findNextOpenLessonForSticky(){
  if(isTeacherMode){
    const levelName = "beginner";
    const lessons = getLevelLessons(levelName);
    const first = lessons[0];

    return first ? {
      levelName,
      number: first.number,
      title: "Мұғалім режимі: кез келген сабақты еркін ашуға болады",
      file: first.file,
      label: courseStructure[levelName].levelTitle
    } : null;
  }

  for(const levelName of visibleLevels){
    if(!canAccessLevel(levelName)) continue;

    const lessons = getLevelLessons(levelName);

    for(const lesson of lessons){
      const status = getLessonStatus(levelName, lessons, lesson.number);
      if(status === "current"){
        return {
          levelName,
          number: lesson.number,
          title: lesson.rawTitle,
          file: lesson.file,
          label: courseStructure[levelName].levelTitle
        };
      }
    }
  }

  const fallbackLevel = userLevel || "beginner";
  const lessons = getLevelLessons(fallbackLevel);
  const first = lessons[0];

  return first ? {
    levelName: fallbackLevel,
    number: first.number,
    title: first.rawTitle,
    file: first.file,
    label: courseStructure[fallbackLevel].levelTitle
  } : null;
}

function renderChapter(levelName, chapter, access, startNumber, allLevelLessons, controlNumber) {
  const chapterLessons = chapter.lessons.map((_, localIndex) => allLevelLessons[startNumber + localIndex - 1]);
  const total = chapterLessons.length;
  const done = chapterLessons.filter(lesson => isCompletedItem(lesson.id)).length;
  const left = total - done;
  const percent = total ? Math.round(done / total * 100) : 0;

  const chapterStars = getChapterStars(levelName, startNumber, total);
  const maxStars = total * 5;
  const requiredStars = getRequiredChapterStars(total);
  const enoughStars = chapterStars >= requiredStars;
  const starPercent = maxStars ? Math.round(chapterStars / maxStars * 100) : 0;

  const previousControlPassed = isTeacherMode || controlNumber === 1 || isControlPassed(levelName, controlNumber - 1);
  const previousChapterStart = controlNumber === 1 ? 1 : startNumber - courseStructure[levelName].chapters[controlNumber - 2].lessons.length;
  const previousChapterTotal = controlNumber === 1 ? 0 : courseStructure[levelName].chapters[controlNumber - 2].lessons.length;
  const previousEnoughStars = isTeacherMode || controlNumber === 1 || getChapterStars(levelName, previousChapterStart, previousChapterTotal) >= getRequiredChapterStars(previousChapterTotal);

  const chapterUnlocked = isTeacherMode || (access && previousControlPassed && previousEnoughStars);
  const controlPassed = isControlPassed(levelName, controlNumber);
  const chapterLessonsCompleted = chapterLessons.every(lesson => isCompletedItem(lesson.id));
  const controlUnlocked = isTeacherMode || (chapterLessonsCompleted && chapterUnlocked && enoughStars);

  const gateNote = isTeacherMode
    ? `<div class="chapter-gate-note teacher"><i class="fa-solid fa-unlock"></i> Мұғалім режимі: бұл бөлімдегі барлық сабақ және бақылау жұмысы ашық.</div>`
    : !chapterUnlocked
      ? `<div class="chapter-gate-note locked"><i class="fa-solid fa-lock"></i> Бұл бөлім жабық. Алдымен алдыңғы бөлімнен 60% жұлдыз жинап, бақылаудан өту керек.</div>`
      : enoughStars
        ? `<div class="chapter-gate-note ok"><i class="fa-solid fa-star"></i> ${chapterStars}/${maxStars} ⭐ жиналды. Келесі бөлім ашық.</div>`
        : `<div class="chapter-gate-note no"><i class="fa-solid fa-star-half-stroke"></i> Бұл бөлім ашық. Қазір: ${chapterStars}/${maxStars} ⭐. Келесі бөлім үшін кемінде ${requiredStars} ⭐ керек.</div>`;

  let rows = "";

  chapter.lessons.forEach((title, localIndex) => {
    const lessonNumber = startNumber + localIndex;
    const lesson = allLevelLessons[lessonNumber - 1];
    let status = getLessonStatus(levelName, allLevelLessons, lessonNumber);

    if (!chapterUnlocked && status !== "completed") status = "locked";

    const isOpen = access && chapterUnlocked && status !== "locked";

    if (activeTab === "done" && status !== "completed") return;
    if (activeTab === "left" && status === "completed") return;

    const icon = status === "completed" ? "fa-check" : (status === "teacher" ? "fa-unlock" : (status === "current" ? "fa-play" : "fa-lock"));
    const lessonStars = getLessonStars(levelName, lessonNumber);
    const lessonUrl = getLessonPageUrl(lesson);

    const statusText = status === "completed"
      ? `Аяқталды · ${lessonStars}/5 ⭐`
      : (status === "teacher" ? `Мұғалім режимі` : (status === "current" ? `Қазір ашық` : "Құлыпталған"));

    const actionHtml = isOpen
      ? renderMapLessonAction(status, lessonStars, levelName, lessonNumber, lessonUrl)
      : "";

    const statusClass = status === "completed"
      ? "status-completed"
      : (status === "teacher" ? "status-teacher" : (status === "current" ? "status-current" : "status-locked"));

    const numberIcon = status === "completed"
      ? `<i class="fa-solid ${icon}"></i>`
      : (status === "teacher" ? `<i class="fa-solid ${icon}"></i>` : (status === "current" ? lessonNumber : `<i class="fa-solid ${icon}"></i>`));

    const inner = `
      <div class="lesson-icon">${numberIcon}</div>
      <div class="lesson-info">
        <h4>${lesson.title}</h4>
        ${renderLessonStars(levelName, lessonNumber)}
        <div class="lesson-card-footer">
          <span class="lesson-status ${statusClass}">${statusText}</span>
          ${actionHtml}
        </div>
      </div>
    `;

    rows += isOpen
      ? `<div id="lesson-${lesson.id}" class="lesson-card ${status}" role="link" tabindex="0" onclick="openLessonFromMap(event, '${levelName}', ${lessonNumber}, '${lessonUrl}', false)" onkeydown="if(event.key === 'Enter'){openLessonFromMap(event, '${levelName}', ${lessonNumber}, '${lessonUrl}', false)}">${inner}</div>`
      : `<div id="lesson-${lesson.id}" class="lesson-card-disabled">${inner}</div>`;
  });

  const roadSteps = chapterLessons.slice(0, Math.max(5, Math.min(8, chapterLessons.length))).map((lesson, i) => {
    const lessonNumber = startNumber + i;
    let status = getLessonStatus(levelName, allLevelLessons, lessonNumber);

    if (!chapterUnlocked && status !== "completed") status = "locked";

    const cls = status === "completed" ? "done" : (status === "current" ? "current" : "locked");
    const content = status === "completed"
      ? `<i class="fa-solid fa-check"></i>`
      : (status === "current" ? lesson.number : `<i class="fa-solid fa-lock"></i>`);

    return `<div class="step ${cls}">${content}</div>`;
  }).join("");

  const controlCard = isTeacherMode
    ? `
      <a href="${BASE_PATH}${levelName}/control_work_${controlNumber}.html" class="control-card teacher">
        <i class="fa-solid fa-unlock"></i>
        <div>
          <h4>${chapter.control}</h4>
          <p>Мұғалім режимі: бақылау жұмысы тексеру үшін ашық.</p>
        </div>
        <div class="control-meta">
          <span>Ашық 🔓</span>
        </div>
      </a>
    `
    : controlPassed
    ? `
      <a href="${BASE_PATH}${levelName}/control_work_${controlNumber}.html" class="control-card">
        <i class="fa-solid fa-clipboard-check"></i>
        <div>
          <h4>${chapter.control}</h4>
          <p>${chapter.chapterTitle} бойынша қорытынды бақылау жұмысы.</p>
        </div>
        <div class="control-meta">
          <span>Бақылау өтті ✅</span>
        </div>
      </a>
    `
    : controlUnlocked
    ? `
      <a href="${BASE_PATH}${levelName}/control_work_${controlNumber}.html" class="control-card">
        <i class="fa-solid fa-clipboard-check"></i>
        <div>
          <h4>${chapter.control}</h4>
          <p>${total} сабақ аяқталды. Жұлдыз жеткілікті. Бақылауға өте аласың.</p>
        </div>
        <button class="control-action">Бақылауға өту <i class="fa-solid fa-arrow-right"></i></button>
      </a>
    `
    : `
      <div class="control-card-disabled">
        <i class="fa-solid fa-lock"></i>
        <div>
          <h4>${chapter.control}</h4>
          <p>${!chapterUnlocked ? "Келесі бөлімді ашу үшін алдыңғы бөлімнен 60% жұлдыз және бақылау жұмысы қажет." : !chapterLessonsCompleted ? "Алдымен осы бөлімнің барлық сабақтарын аяқтаңыз." : `Кемінде ${requiredStars} жұлдыз керек.`}</p>
        </div>
        <div class="control-meta">
          <span>Құлыпталған</span>
        </div>
      </div>
    `;

  return `
    <div class="chapter-card ${chapterUnlocked ? "" : "chapter-locked"}">
      <div class="chapter-header">
        <h3>${chapter.chapterTitle}</h3>
        <div class="chapter-mini">
          <span class="chapter-pill blue">${done}/${total} сабақ</span>
          <span class="chapter-pill ${enoughStars ? "star-ok" : "star-no"}">⭐ ${chapterStars}/${maxStars}</span>
          <span class="chapter-pill ${enoughStars ? "green" : "orange"}">${enoughStars ? "60% шек өтті" : `${requiredStars} ⭐ керек`}</span>
          ${isTeacherMode ? `<span class="chapter-pill green">Ашық 🔓</span>` : (controlPassed ? `<span class="chapter-pill green">Бақылау өтті ✅</span>` : `<span class="next-gate-label"><i class="fa-solid fa-lock"></i> бақылау қажет</span>`)}
        </div>
      </div>

      <div class="chapter-progress">
        <div class="chapter-progress-fill" style="width:${percent}%"></div>
      </div>

      ${gateNote}

      <div class="roadmap-wrap">
        <div class="roadline">${roadSteps}</div>
        <div class="lesson-list">
          ${rows}
          ${controlCard}
        </div>
      </div>
    </div>
  `;
}

  const access = canAccessLevel(levelName);
  const allLevelLessons = getLevelLessons(levelName);
  const progress = getLevelProgress(levelName);
  const stars = getTotalStarsForLevel(levelName);

        <div class="level-head">
          <div class="level-left">

            </div>

            </div>

            ${allLevelLessons.length} сабақ
          </div>

          <span class="level-stat">${allLevelLessons.length} сабақ</span>
          <span class="level-stat green">${progress.done} меңгерілді</span>
          <span class="level-stat orange">${progress.left} қалды</span>
          <span class="level-stat blue">${progress.percent}%</span>
          <span class="level-stat star">⭐ ${stars}/${allLevelLessons.length * 5}</span>
        </div>

        <div class="level-progress-line extra-top">
          <div style="width:${progress.percent}%"></div>
        </div>

        <div class="level-goal extra-top">
          <i class="fa-solid fa-bullseye"></i>
          <span>${levelName === "beginner" ? "Деңгей мақсаты: механиканың негізгі ұғымдарын түсініп, жеңіл есептерді сенімді шығару." : levelName === "intermediate" ? "Деңгей мақсаты: формулаларды дұрыс қолданып, аралас есептерді талдау." : "Деңгей мақсаты: күрделі есептерді шығарып, физикалық талдау жасау."}</span>

  level.chapters.forEach((chapter, index) => {

}

function updateQuickLessons() {
  const levelKey = document.getElementById("quickLevel").value;
  const chapterIndex = document.getElementById("quickChapter").value;
  const lessonSelect = document.getElementById("quickLesson");

  lessonSelect.innerHTML = `<option value="">Сабақ таңдаңыз</option>`;

  if (!levelKey || chapterIndex === "") return;

  const allLevelLessons = getLevelLessons(levelKey);
  let startNumber = 1;

  for (let i = 0; i < Number(chapterIndex); i++) {
    startNumber += courseStructure[levelKey].chapters[i].lessons.length;
  }

  const chapter = courseStructure[levelKey].chapters[chapterIndex];
  chapter.lessons.forEach((_, localIndex) => {
    const lesson = allLevelLessons[startNumber + localIndex - 1];
    lessonSelect.innerHTML += `<option value="${lesson.id}">${lesson.title}</option>`;
  });
}

function goToQuickLesson() {
  const lessonId = document.getElementById("quickLesson").value;
  if (!lessonId) {
    alert("Алдымен сабақ таңдаңыз.");
    return;
  }

  const target = document.getElementById(`lesson-${lessonId}`);
  if (!target) {
    alert("Сабақ табылмады.");
    return;
  }

  target.scrollIntoView({ behavior: "smooth", block: "center" });
  target.classList.add("lesson-highlight");
  setTimeout(() => target.classList.remove("lesson-highlight"), 1800);
}

function searchLessonByText() {
  const q = (document.getElementById("lessonSearch")?.value || "").trim().toLowerCase();
  if (!q) return;

  const all = getAllCourseLessons();
  const found = all.find(l => l.title.toLowerCase().includes(q) || l.rawTitle.toLowerCase().includes(q));

  if (!found) {
    alert("Сабақ табылмады.");
    return;
  }

  const target = document.getElementById(`lesson-${found.id}`);
  if (target) {
    target.scrollIntoView({behavior:"smooth", block:"center"});
    target.classList.add("lesson-highlight");
    setTimeout(() => target.classList.remove("lesson-highlight"), 1500);
  }
}

function setMapView(view) {
  mapView = view;
  localStorage.setItem("physxMapView", view);
  renderMap();
  renderAuthArea();

  if(view === "quick"){
    document.body.classList.add("sidebar-collapsed-override-off");
    document.body.classList.remove("sidebar-collapsed");
    localStorage.setItem("physxSidebarCollapsed", "0");
    setTimeout(() => {
      const search = document.getElementById("lessonSearch");
      if(search) search.focus();
    }, 120);
  }
}

function setActiveTab(tab) {
  activeTab = tab;
  renderMap();
  renderAuthArea();
}

function updateViewClass() {
  document.body.classList.remove(
    "map-view-roadmap",
    "map-view-quick",
    "map-view-list",
    "map-view-card",
    "map-view-snake",
    "map-view-compact"
  );

  document.body.classList.add(`map-view-${mapView}`);

  if(mapView === "quick"){
    document.body.classList.remove("sidebar-collapsed");
  }
}

function toggleSidebar(){
  document.body.classList.toggle("sidebar-collapsed");
  const isCollapsed = document.body.classList.contains("sidebar-collapsed");
  localStorage.setItem("physxSidebarCollapsed", isCollapsed ? "1" : "0");
  updateSidebarToggleButtons();
}

function restoreSidebar(){
  const saved = localStorage.getItem("physxSidebarCollapsed");

  if(saved === null){
    document.body.classList.add("sidebar-collapsed");
    localStorage.setItem("physxSidebarCollapsed", "1");
  }else if(saved === "1"){
    document.body.classList.add("sidebar-collapsed");
  }else{
    document.body.classList.remove("sidebar-collapsed");
  }

  if(mapView === "quick"){
    document.body.classList.remove("sidebar-collapsed");
  }

  updateSidebarToggleButtons();
}

function updateSidebarToggleButtons(){
  const isCollapsed = document.body.classList.contains("sidebar-collapsed");
  document.querySelectorAll(".sidebar-toggle-v2 span").forEach(span => {
    span.textContent = isCollapsed ? "Ашу" : "Жабу";
  });
  document.querySelectorAll(".sidebar-toggle-v2 i").forEach(icon => {
    icon.className = isCollapsed ? "fa-solid fa-chevron-right" : "fa-solid fa-chevron-left";
  });
}


function toggleMapTopBlock(){
  document.body.classList.toggle("map-top-collapsed");
  localStorage.setItem("physxMapTopCollapsed", document.body.classList.contains("map-top-collapsed") ? "1" : "0");
}

function restoreMapTopBlock(){
  if(localStorage.getItem("physxMapTopCollapsed") === "1"){
    document.body.classList.add("map-top-collapsed");
  }
}

function scrollToLevel(level) {
  const target = document.getElementById(`level-${level}`);
  if (!target) {
    alert("Бұл деңгей бөлімі табылмады!");
    return;
  }

  target.scrollIntoView({
    behavior: "smooth",
    block: "start"
  });
}

function migrateCompletedLessonsToStars(){
  const userNow = JSON.parse(localStorage.getItem("physxUser")) || {};
  const completed = userNow.progress?.lessonsCompleted || [];

  completed.forEach(id => {
    const normalized = String(id).replaceAll("_", "-");
    const match = normalized.match(/^(beginner|intermediate|advanced)-lesson-(\d+)$/);

    if(!match) return;

    const levelName = match[1];
    const lessonNumber = Number(match[2]);
    const starKey = `${levelName}-lesson-${lessonNumber}-stars`;
    const oldStarKey = `lesson${lessonNumber}_stars`;

    const existing = Number(localStorage.getItem(starKey) || localStorage.getItem(oldStarKey) || 0);

    if(existing <= 0){
      localStorage.setItem(starKey, "3");
      localStorage.setItem(oldStarKey, "3");
      localStorage.setItem(`${levelName}-lesson-${lessonNumber}-score`, "6");
      localStorage.setItem(`lesson${lessonNumber}_score`, "6");
    }
  });
}


function renderAuthArea(){
  const authArea = document.getElementById("authArea");
  if(!authArea) return;

  const savedUser = JSON.parse(localStorage.getItem("physxUser")) || {};
  const loggedIn = Boolean(savedUser.isLoggedIn || savedUser.name || savedUser.email);

  if(loggedIn){
    authArea.innerHTML = `
      <a href="profile.html" class="nav-link profile-link">
        <i class="fa-solid fa-user"></i> ${isTeacherMode ? "Мұғалім режимі" : "Профиль"}
      </a>
    `;
  }else{
    authArea.innerHTML = `<a href="login.html" class="nav-link login-link">Кіру</a>`;
  }
}

function logoutUser(event){
  if(event) event.preventDefault();

  const savedUser = JSON.parse(localStorage.getItem("physxUser")) || {};
  delete savedUser.isLoggedIn;
  delete savedUser.name;
  delete savedUser.email;

  localStorage.setItem("physxUser", JSON.stringify(savedUser));
  window.location.href = "index.html";
}

function renderMap() {
  migrateCompletedLessonsToStars();

  const container = document.getElementById("mapPage");
  container.innerHTML = renderSidebar() + `<section class="map-main">${renderTopMain()}</section>`;

  restoreMapTopBlock();
  restoreSidebar();
  updateViewClass();
  populateQuickFinder();

  localStorage.setItem("physxUser", JSON.stringify(user));
}

renderMap();
renderAuthArea();

</script>
</body>
</html>
